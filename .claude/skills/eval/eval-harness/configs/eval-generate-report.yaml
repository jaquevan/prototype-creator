name: eval-generate-report
description: Evaluate eval-generate-report skill — standalone report regeneration from cached artifacts
skill: eval-generate-report

execution:
  mode: case
  arguments: "{strat_key}"
  timeout: 120
  max_budget_usd: 2.00

runner:
  type: claude-code
  effort: medium

models:
  skill: claude-sonnet-4-6
  judge: claude-opus-4-6

mlflow:
  experiment: prototype-creator-eval

permissions:
  allow: []
  deny: ["mcp__*"]

dataset:
  path: .claude/skills/eval/eval-harness/datasets/eval-generate-report/cases
  schema: |
    Each case directory contains:
    - input.yaml: YAML with fields:
      - strat_key: Jira key (used for artifact path lookup)
    - fixtures/evaluation-report.csv: Complete CSV with Section 1 + Section 2
    - fixtures/journey-log.json: Complete journey log
    - fixtures/persona-results.json: Persona results
    - fixtures/extract-state.json: Extraction state
    - fixtures/screenshots/: Captured screenshots
    - annotations.yaml: Ground truth:
      - expected_html_produced: boolean (true)
      - expected_summary_produced: boolean (true)

outputs:
  - path: artifacts
    schema: |
      Artifacts produced by eval-generate-report:
      - evaluation-report.html: Self-contained HTML report (same format as eval-report)
      - evaluation-summary.json: Machine-readable summary

traces:
  stdout: true
  stderr: true
  metrics: true

judges:
  - name: html_produced
    description: Validates evaluation-report.html is produced
    check: |
      files = outputs.get("files", {})
      html_files = [v for k, v in files.items() if k.endswith("evaluation-report.html")]
      if not html_files:
          return (False, "evaluation-report.html not produced")
      return (True, f"evaluation-report.html produced ({len(html_files[0])} chars)")

  - name: summary_produced
    description: Validates evaluation-summary.json is produced
    check: |
      import json
      files = outputs.get("files", {})
      summary_files = [v for k, v in files.items() if k.endswith("evaluation-summary.json")]
      if not summary_files:
          return (False, "evaluation-summary.json not produced")
      try:
          json.loads(summary_files[0])
      except json.JSONDecodeError as e:
          return (False, f"Invalid JSON: {e}")
      return (True, "evaluation-summary.json produced and valid")

  - name: report_not_empty
    description: Validates report content is substantive (not just boilerplate)
    check: |
      files = outputs.get("files", {})
      html_files = [v for k, v in files.items() if k.endswith("evaluation-report.html")]
      if not html_files:
          return (False, "No HTML to check")
      html = html_files[0]
      if len(html.strip()) < 500:
          return (False, f"Report too short ({len(html)} chars) — likely empty template")
      if "<table" not in html.lower() and "<section" not in html.lower():
          return (False, "Report missing structural HTML elements (tables or sections)")
      return (True, f"Report substantive: {len(html)} chars with structural elements")

  - name: budget_check
    builtin: cost_budget
    arguments:
      max_cost_usd: 2.00

thresholds:
  html_produced:
    min_pass_rate: 1.0
  summary_produced:
    min_pass_rate: 1.0
  report_not_empty:
    min_pass_rate: 1.0
  budget_check:
    min_pass_rate: 1.0
