name: eval-extract
description: Evaluate eval-extract skill — Jira context extraction, AC discovery, MR delta identification
skill: eval-extract

execution:
  mode: case
  arguments: "{strat_key} {prototype_url} --workspace={workspace} --phase={phase}"
  timeout: 120
  parallelism: 2
  max_budget_usd: 2.00

runner:
  type: claude-code
  effort: high

models:
  skill: claude-opus-4-6
  judge: claude-opus-4-6

mlflow:
  experiment: prototype-creator-eval

permissions:
  allow: ["Skill"]
  deny: ["mcp__*"]

dataset:
  path: .claude/skills/eval/eval-harness/datasets/eval-extract/cases
  schema: |
    Each case directory contains:
    - input.yaml: YAML with fields:
      - strat_key: ([EXTERNAL: Jira] — real RHAISTRAT key, e.g. RHAISTRAT-1536)
      - prototype_url: URL of the running prototype (e.g. http://localhost:9000)
      - workspace: path to the prototype repo checkout
      - phase: 'core' or 'enrichment'
    - annotations.yaml: Ground truth for validation:
      - expected_ac_count: integer count of ACs in the ticket
      - expected_ac_ids: list of AC IDs (e.g. [AC-1, AC-2, NAV-1])
      - expected_persona_names: list of expected persona selections
      - expected_mr_files_count: integer count of changed files
      - has_linked_rfe: boolean — whether the ticket has a linked RFE
      - has_parent_outcome: boolean — whether a parent Outcome ticket exists
    Workspace reset fields (added to input.yaml for reproducibility):
    - workspace_branch: git branch to checkout before running
    - workspace_commit: exact short SHA to reset to (pre-fix state)
    - workspace_reset: boolean flag indicating the harness should run
      scripts/reset-workspace.sh before executing the skill

inputs:
  tools:
    - match: Any Jira interaction via MCP tools or scripts
      prompt: |
        Allow Jira reads for the ticket specified in input.yaml.
        Block writes (comments, status changes) during eval.

outputs:
  - path: artifacts
    schema: |
      Artifacts produced by eval-extract:
      - extract-state.json: Structured extraction with fields:
        - acceptance_criteria[]: array of {id, text, source, tier?}
        - persona_selection: {target_audience_text, selected[], reasoning}
        - journey_definitions[]: array of {id, title, ac_ids[], expected_path[]}
        - tasks_to_be_done[]: (enrichment phase only) array of task objects
      - mr-delta.json: MR delta with fields:
        - new_files[]: array of file paths added
        - modified_files[]: array of file paths changed
        - deleted_files[]: array of file paths removed
      - outcome-context.json: (enrichment phase only) parent Outcome context

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

judges:
  - name: extract_state_schema
    description: Validates extract-state.json has required fields for downstream skills
    check: |
      import json
      files = outputs.get("files", {})
      state_files = [v for k, v in files.items() if k.endswith("extract-state.json")]
      if not state_files:
          return (False, "extract-state.json not produced")
      state = json.loads(state_files[0])
      acs = state.get("acceptance_criteria", [])
      if not acs:
          return (False, "No acceptance_criteria in extract-state.json")
      for ac in acs:
          missing = [f for f in ["id", "text", "source"] if f not in ac]
          if missing:
              return (False, f"AC {ac.get('id','?')} missing: {missing}")
      personas = state.get("persona_selection", {})
      if not personas.get("selected"):
          return (False, "No persona_selection.selected")
      return (True, f"{len(acs)} ACs, {len(personas['selected'])} personas")

  - name: mr_delta_exists
    description: Validates mr-delta.json exists and has file lists
    check: |
      import json
      files = outputs.get("files", {})
      delta_files = [v for k, v in files.items() if k.endswith("mr-delta.json")]
      if not delta_files:
          return (False, "mr-delta.json not produced")
      delta = json.loads(delta_files[0])
      total = len(delta.get("new_files", [])) + len(delta.get("modified_files", []))
      if total == 0:
          return (False, "mr-delta.json has no files")
      return (True, f"MR delta: {total} files changed")

  - name: ac_completeness
    description: Compares extracted ACs against ground truth count from annotations
    check: |
      import json
      import json
      files = outputs.get("files", {})
      state_files = [v for k, v in files.items() if k.endswith("extract-state.json")]
      if not state_files:
          return (False, "extract-state.json missing")
      state = json.loads(state_files[0])
      acs = state.get("acceptance_criteria", state.get("ac_list", []))
      actual = len(acs)
      if actual == 0:
          return (False, "Zero ACs extracted")
      if actual < 2:
          return (False, f"Only {actual} AC — suspiciously low for a real ticket")
      for ac in acs:
          text = ac.get("text", ac.get("criterion_text", ""))
          if len(text) < 20:
              return (False, f"AC {ac.get('id','?')} text too short ({len(text)} chars): '{text}'")
      annotations = outputs.get("annotations", {})
      expected = annotations.get("expected_ac_count")
      if expected is not None and actual < expected:
          return (False, f"Found {actual} ACs, expected {expected}")
      return (True, f"AC count: {actual}" + (f" (expected {expected})" if expected else " (no ground truth)"))

  - name: ac_id_accuracy
    description: Verifies expected AC IDs are present in extraction
    check: |
      import json
      import json
      files = outputs.get("files", {})
      state_files = [v for k, v in files.items() if k.endswith("extract-state.json")]
      if not state_files:
          return (False, "extract-state.json missing")
      state = json.loads(state_files[0])
      acs = state.get("acceptance_criteria", state.get("ac_list", []))
      actual_ids = [ac.get("id", ac.get("criterion_id", "")) for ac in acs]
      if not actual_ids:
          return (False, "No AC IDs found")
      dupes = [x for x in actual_ids if actual_ids.count(x) > 1]
      if dupes:
          return (False, f"Duplicate AC IDs: {set(dupes)}")
      no_source = [ac for ac in acs if not ac.get("source")]
      if no_source:
          return (False, f"{len(no_source)} ACs missing source field")
      annotations = outputs.get("annotations", {})
      expected_ids = annotations.get("expected_ac_ids", [])
      if expected_ids:
          missing = [eid for eid in expected_ids if eid not in actual_ids]
          if missing:
              return (False, f"Missing ACs: {missing}")
          return (True, f"All {len(expected_ids)} expected ACs found, no dupes, all have source")
      return (True, f"{len(actual_ids)} unique ACs, all have source (no ground truth IDs)")

  - name: outcome_discovery
    description: Validates Outcome ticket discovery and breadcrumb completeness (cross-repo contract from adlc-context)
    check: |
      import json
      files = outputs.get("files", {})
      state_files = [v for k, v in files.items() if k.endswith("extract-state.json")]
      if not state_files:
          return (False, "extract-state.json missing")
      state = json.loads(state_files[0])
      annotations = outputs.get("annotations", {})
      has_parent = annotations.get("has_parent_outcome", False)
      oc_files = [v for k, v in files.items() if k.endswith("outcome-context.json")]
      if has_parent:
          if not oc_files:
              return (False, "Expected parent Outcome but outcome-context.json not produced")
          oc = json.loads(oc_files[0])
          if not oc.get("key") and not oc.get("title"):
              return (False, "outcome-context.json exists but has no key or title")
          return (True, f"Outcome found: {oc.get('key','?')} - {oc.get('title','?')[:50]}")
      raw_parent = state.get("raw_parent")
      raw_links = state.get("raw_issuelinks")
      if raw_parent or raw_links:
          return (True, f"No Outcome expected but cached Jira data present for enrichment phase")
      return (True, "No Outcome expected and no cached data (core phase or no parent)")

  - name: ac_heading_source
    description: Verifies ACs were extracted from a recognized heading (cross-repo contract with rfe-creator)
    check: |
      import json
      files = outputs.get("files", {})
      state_files = [v for k, v in files.items() if k.endswith("extract-state.json")]
      if not state_files:
          return (False, "extract-state.json missing")
      state = json.loads(state_files[0])
      acs = state.get("ac_list", state.get("acceptance_criteria", []))
      if not acs:
          return (False, "No ACs to check heading source")
      sources = set(ac.get("source", "") for ac in acs)
      jira_acs = [ac for ac in acs if ac.get("source") == "jira"]
      inferred_acs = [ac for ac in acs if ac.get("source") == "inferred"]
      if not jira_acs and not inferred_acs:
          return (False, f"ACs have unexpected sources: {sources}")
      if jira_acs and len(jira_acs) < 2:
          return (False, f"Only {len(jira_acs)} Jira-sourced AC — may indicate heading mismatch")
      msg = f"{len(jira_acs)} from Jira, {len(inferred_acs)} inferred"
      if len(inferred_acs) > len(jira_acs):
          return (False, f"More inferred ({len(inferred_acs)}) than Jira ({len(jira_acs)}) ACs — heading extraction may have failed")
      return (True, msg)

  - name: jira_calls_ok
    builtin: tool_call_validation

  - name: budget_check
    builtin: cost_budget
    arguments:
      max_cost_usd: 2.00

thresholds:
  extract_state_schema:
    min_pass_rate: 1.0
  mr_delta_exists:
    min_pass_rate: 1.0
  ac_completeness:
    min_pass_rate: 0.8
  ac_id_accuracy:
    min_pass_rate: 0.8
  outcome_discovery:
    min_pass_rate: 0.8
  ac_heading_source:
    min_pass_rate: 1.0
  jira_calls_ok:
    min_pass_rate: 0.9
  budget_check:
    min_pass_rate: 1.0
