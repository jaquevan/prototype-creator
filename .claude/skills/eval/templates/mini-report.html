<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — Mini Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .container { max-width: 900px; margin: 0 auto; padding: 24px; }
  header { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 16px; border-left: 4px solid {{VERDICT_COLOR}}; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .key { color: #666; font-size: 14px; font-weight: 400; }
  .verdict { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 14px; font-weight: 600; color: #fff; background: {{VERDICT_COLOR}}; margin-top: 8px; }
  .summary { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { text-align: center; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #666; margin-top: 2px; }
  .gallery { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .gallery h2 { font-size: 16px; margin-bottom: 16px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .screenshot-card { border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
  .screenshot-card img { width: 100%; display: block; }
  .screenshot-label { padding: 10px 12px; background: #fafafa; border-top: 1px solid #e0e0e0; }
  .screenshot-label .persona { font-weight: 600; font-size: 13px; }
  .screenshot-label .task { font-size: 12px; color: #555; margin-top: 2px; }
  .prototype-link { display: block; text-align: center; background: #0066cc; color: #fff; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; margin-bottom: 16px; }
  .prototype-link:hover { background: #0052a3; }
  footer { text-align: center; color: #999; font-size: 12px; padding: 16px; }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>{{TITLE}} <span class="key">{{KEY}}</span></h1>
  <div class="verdict">{{VERDICT}}</div>
</header>

<div class="summary">
  <div class="summary-grid">
    <div class="stat"><div class="stat-value">{{AC_PASS}}</div><div class="stat-label">PASS</div></div>
    <div class="stat"><div class="stat-value">{{AC_FAIL}}</div><div class="stat-label">FAIL</div></div>
    <div class="stat"><div class="stat-value">{{AC_FLAGGED}}</div><div class="stat-label">FLAGGED</div></div>
    <div class="stat"><div class="stat-value">{{USABILITY}}</div><div class="stat-label">Usability</div></div>
  </div>
</div>

<a class="prototype-link" href="{{PROTOTYPE_URL}}" target="_blank">Open Prototype →</a>

<div class="gallery">
  <h2>Persona Walkthroughs</h2>
  <div class="gallery-grid">
    {{SCREENSHOT_CARDS}}
  </div>
</div>

<footer>
  Generated {{TIMESTAMP}} · {{MODEL}} · {{DURATION}} · {{COST}}
</footer>

</div>
</body>
</html>
