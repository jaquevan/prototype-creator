<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decision: {{DECISION_NAME}} — {{PROTOTYPE_ID}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    line-height: 1.6;
    padding: 40px;
  }

  .decision-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .decision-header h1 { font-size: 28px; color: #f8fafc; margin-bottom: 8px; }
  .decision-header .question {
    font-size: 18px;
    color: #94a3b8;
    max-width: 600px;
    margin: 0 auto;
  }
  .decision-header .context {
    font-size: 14px;
    color: #64748b;
    margin-top: 12px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto 48px;
  }

  .option-card {
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .option-card:hover {
    border-color: #3b82f6;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
  }
  .option-card--selected {
    border-color: #22c55e;
    background: #1a2e1a;
  }
  .option-card--recommended {
    border-color: #f59e0b;
  }
  .option-card h3 {
    font-size: 18px;
    color: #f8fafc;
    margin-bottom: 8px;
  }
  .option-card .description {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 16px;
  }
  .option-card .preview {
    background: #0f172a;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #64748b;
  }
  .option-card .when-to-use {
    font-size: 12px;
    color: #64748b;
    border-top: 1px solid #334155;
    padding-top: 12px;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge--recommended { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
  .badge--selected { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

  .comparison-table {
    max-width: 1200px;
    margin: 0 auto 48px;
  }
  .comparison-table h2 {
    font-size: 20px;
    margin-bottom: 16px;
    color: #f8fafc;
  }
  .comparison-table table {
    width: 100%;
    border-collapse: collapse;
  }
  .comparison-table th, .comparison-table td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid #1e293b;
    font-size: 14px;
  }
  .comparison-table th {
    color: #94a3b8;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .tradeoffs {
    max-width: 1200px;
    margin: 0 auto 48px;
  }
  .tradeoffs h2 { font-size: 20px; margin-bottom: 16px; color: #f8fafc; }
  .tradeoff-item {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
    padding: 16px;
    background: #1e293b;
    border-radius: 8px;
  }
  .tradeoff-item h4 { font-size: 14px; color: #f8fafc; margin-bottom: 8px; }
  .pro { color: #22c55e; }
  .con { color: #ef4444; }
  .pro::before { content: '+ '; }
  .con::before { content: '− '; }

  .choice-section {
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
    padding: 32px;
    background: #1e293b;
    border-radius: 12px;
  }
  .choice-section h2 { margin-bottom: 16px; }
  .choice-section .chosen {
    font-size: 24px;
    font-weight: 700;
    color: #22c55e;
    margin-bottom: 8px;
  }
  .choice-section .reasoning {
    font-size: 14px;
    color: #94a3b8;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="decision-header">
  <div class="context">{{PROTOTYPE_ID}} — Decision {{DECISION_NUMBER}} of {{TOTAL_DECISIONS}}</div>
  <h1>{{DECISION_NAME}}</h1>
  <p class="question">{{DECISION_QUESTION}}</p>
</div>

<div class="options-grid">
  {{OPTIONS}}
</div>

<div class="comparison-table">
  <h2>Side-by-Side Comparison</h2>
  {{COMPARISON_TABLE}}
</div>

<div class="tradeoffs">
  <h2>Tradeoffs</h2>
  {{TRADEOFFS}}
</div>

<div class="choice-section">
  <h2>Your Choice</h2>
  <div class="chosen">{{CHOSEN_OPTION}}</div>
  <div class="reasoning">{{REASONING}}</div>
</div>

</body>
</html>
