# Pipeline Settings
# Controls RFE discovery, filtering, and batch processing.

# --- Jira JQL Filters ---
jql:
  project: PROJ
  required_labels:
    - prototype-creator-candidate
  quality_labels:
    - rfe-creator-autofix-rubric-pass
    - tech-reviewed
  excluded_statuses:
    - Closed
    - Resolved
    - Draft
  order_by: key ASC

# --- Batch Processing ---
batch:
  batch_size: 5
  batch_offset: 0

# --- Pipeline Labels (applied to Jira issues) ---
labels:
  auto_created: prototype-creator-auto-created
  rubric_pass: prototype-creator-rubric-pass
  needs_attention: prototype-creator-needs-attention
  submitted: prototype-creator-submitted

# --- Scoring Thresholds ---
scoring:
  pass_threshold: 6
  min_per_dimension: 1
  dimensions:
    - completeness
    - usability
    - feasibility
    - fidelity_match

# --- Defaults ---
defaults:
  fidelity: low
  mode: auto
  depth: normal
  target: local
  workspace: null
  max_refinement_cycles: 3

# --- Design System ---
design_system:
  name: PatternFly
  version: "6"
  docs_url: https://www.patternfly.org/
  context_path: .context/design-system/

# --- Decision Kit Integration ---
decision_kit:
  repo: https://github.com/jnemargut/decision-kit
  artifacts_dir: .artifacts
  thinking_skills:
    - strategize
    - shape
    - product-design

# --- Usability Testing Integration ---
usability_testing:
  repo: https://gitlab.cee.redhat.com/zbodnar/automated-usability-testing
  context_path: .context/usability-testing/
  personas_dir: personas/
  rubric: prompts/evaluate-flow.md
  dimensions:
    - workflow_continuity
    - cross_persona_handoffs
    - scalability_complexity
    - system_status_trust
    - technical_abstraction
    - mental_model_fidelity
    - accessibility_inclusion

# --- Decision Depth ---
# Controls how many decisions are surfaced in --mode=decide.
# Decisions are dynamically planned based on the RFE and codebase context.
decision_depth:
  under: { min: 2, max: 3 }
  normal: { min: 4, max: 7 }
  over: { min: 8, max: 12 }
